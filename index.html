<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RoundEndSound Generator</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    background: #1f2937;
    padding: 25px;
    border-radius: 15px;
    width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

input {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
}

input:focus {
    box-shadow: 0 0 5px #3b82f6;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

button {
    border: none;
    border-radius: 10px;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.add-btn {
    background: #10b981;
    color: white;
}

.add-btn:hover {
    background: #059669;
}

.generate-btn {
    background: #3b82f6;
    color: white;
}

.generate-btn:hover {
    background: #2563eb;
}

.remove-btn {
    background: #ef4444;
    color: white;
    padding: 0 10px;
}

.remove-btn:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎵 RoundEndSound Generator</h2>

    <div id="inputs"></div>

    <div class="buttons">
        <button class="add-btn" onclick="addRow()">➕ Добавить</button>
        <button class="generate-btn" onclick="generateConfig()">Создать конфиг</button>
    </div>
</div>

<script>
function addRow() {
    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
        <input type="text" placeholder="Название песни">
        <input type="text" placeholder="SoundEvent Name">
        <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
    `;

    document.getElementById("inputs").appendChild(div);
}

// первая строка
addRow();

function generateConfig() {
    const rows = document.querySelectorAll(".row");

    let musicBlock = "";

    rows.forEach((row, index) => {
        const inputs = row.querySelectorAll("input");
        const song = inputs[0].value.trim();
        const sound = inputs[1].value.trim();

        if (song && sound) {
            musicBlock += `        "${index + 1}"\n`;
            musicBlock += `        {\n`;
            musicBlock += `            "Name"        "${song}"\n`;
            musicBlock += `            "Sound"       "${sound}"\n`;
            musicBlock += `        }\n`;
        }
    });

    const config = `"RoundEndSound"
{
    "DefaultVolume"                 "5"
    "DisableRandom"                 "0"

    "Music"
    {
${musicBlock}
    }
}`;

    const blob = new Blob([config], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "roundendsound.ini";
    a.click();
}
</script>

</body>
</html>
