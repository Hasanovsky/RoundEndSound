<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RoundEndSound Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #000000);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* Container */
.container-box {
    background: rgba(28, 28, 30, 0.15);
    padding: 20px;
    width: 800px;
    height: 85vh;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(20px);
    /*border-radius: 16px;*/
    /*border: 1px solid rgba(255,255,255,0.08);*/
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* Inputs container */
.inputs-container {
    flex: 1;
    overflow-y: auto;
    padding-right: 6px;
}

/* ✨ Apple-style thin scrollbar */
.inputs-container::-webkit-scrollbar {
    width: 6px;
}

.inputs-container::-webkit-scrollbar-track {
    background: transparent;
}

.inputs-container::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    transition: 0.2s;
}

.inputs-container::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.3);
}

/* Firefox */
.inputs-container {
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
}

/* Row */
.row-item {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

/* Inputs */
.input-group-custom {
    position: relative;
    flex: 1;
}

.input-group-custom input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    transition: 0.2s;
    font-size: 13px;
}

.input-group-custom input:focus {
    border-color: rgba(0,122,255,0.8);
    box-shadow: 0 0 0 2px rgba(0,122,255,0.25);
}

.input-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.6;
}

.invalid {
    border: 1px solid #ff3b30 !important;
}

/* Buttons (Apple style) */
.btn {
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    font-weight: 500;
    font-size: 13px;
    background: rgba(255,255,255,0.05);
    color: white;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
}

.btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-1px);
}

.btn:active {
    transform: scale(0.96);
    background: rgba(255,255,255,0.12);
}

.btn-danger {
    color: #ff6b6b;
}

.btn-danger:hover {
    background: rgba(255,59,48,0.15);
    border-color: rgba(255,59,48,0.4);
}
</style>
</head>

<body>

<div class="container-box">
    <h3 class="text-center mb-3">🎵 RoundEndSound Generator</h3>

    <div id="inputs" class="inputs-container mb-3"></div>

    <div class="d-flex justify-content-between">
        <div class="d-flex gap-2">
            <button class="btn" onclick="addRow()">➕</button>
            <button class="btn" onclick="addMultiple(10)">+10</button>
        </div>

        <div class="d-flex gap-2">
            <button class="btn" onclick="generateINI()">Создать ini</button>
            <button class="btn" onclick="generateVSNDEvents()">Создать vsndevts</button>
        </div>
    </div>
</div>

<script>
function isValidEventName(name) {
    return /^[A-Za-z_][A-Za-z0-9_.]*$/.test(name);
}

function createRow() {
    const div = document.createElement("div");
    div.className = "row-item";

    div.innerHTML = `
        <div class="input-group-custom">
            <span class="input-icon">🎵</span>
            <input type="text" placeholder="Название песни">
        </div>

        <div class="input-group-custom">
            <span class="input-icon">⚡</span>
            <input type="text" class="event-input" placeholder="SoundEvent Name">
        </div>

        <div class="input-group-custom">
            <span class="input-icon">📁</span>
            <input type="text" placeholder="sounds/... .vsnd">
        </div>

        <button class="btn btn-danger" onclick="this.parentElement.remove()">✖</button>
    `;

    const eventInput = div.querySelector(".event-input");

    eventInput.addEventListener("input", () => {
        if (!isValidEventName(eventInput.value)) {
            eventInput.classList.add("invalid");
        } else {
            eventInput.classList.remove("invalid");
        }
    });

    return div;
}

function addRow() {
    document.getElementById("inputs").appendChild(createRow());
}

function addMultiple(count) {
    const container = document.getElementById("inputs");
    for (let i = 0; i < count; i++) {
        container.appendChild(createRow());
    }
}

addMultiple(3);

function validateAll() {
    const inputs = document.querySelectorAll(".event-input");
    for (let input of inputs) {
        if (input.value && !isValidEventName(input.value)) {
            alert("Ошибка: SoundEvent Name содержит недопустимые символы!");
            return false;
        }
    }
    return true;
}

function generateINI() {
    if (!validateAll()) return;

    const rows = document.querySelectorAll(".row-item");
    let musicBlock = "";
    let index = 1;

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");

        const song = inputs[0].value.trim();
        const eventName = inputs[1].value.trim();

        if (song && eventName) {
            musicBlock += `        "${index}"\n`;
            musicBlock += `        {\n`;
            musicBlock += `            "Name" "${song}"\n`;
            musicBlock += `            "Sound" "${eventName}"\n`;
            musicBlock += `        }\n`;
            index++;
        }
    });

    const config = `"RoundEndSound"
{
    "DefaultVolume" "5"
    "DisableRandom" "0"

    "Music"
    {
${musicBlock}
    }
}`;

    downloadFile(config, "roundendsound.ini");
}

function generateVSNDEvents() {
    const rows = document.querySelectorAll(".row-item"); // ✅ исправлено

    let eventsBlock = "";

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");

        const eventName = inputs[1]?.value.trim();
        const path = inputs[2]?.value.trim();

        if (eventName && path) {
            eventsBlock += `    ${eventName} = \n`;
            eventsBlock += `    {\n`;
            eventsBlock += `        base = "roundendsound.base"\n`;
            eventsBlock += `        vsnd_files = "${path}"\n`;
            eventsBlock += `        volume = 1.000000\n`;
            eventsBlock += `    }\n`;
        }
    });

    const config = `<!-- kv3 encoding:text:version{e21c7f3c-8a33-41c5-9977-a76d3a32aa0d} format:generic:version{7412167c-06e9-4698-aff2-e63eb59037e7} -->
{
    Event.CTWin = 
    {
        type = "csgo_mega"
        volume = 0.000000
    }
    Event.TERWin = 
    {
        type = "csgo_mega"
        volume = 0.000000
    }
    Announcer.CTWin.CS2_Classic = 
    {
        type = "csgo_mega"
        volume = 0.000000
    }
    Announcer.TWin.CS2_Classic = 
    {
        type = "csgo_mega"
        volume = 0.000000
    }
    roundendsound.base = 
    {
        type = "csgo_music"
        priority = 5.000000
        stop_music = "true"
        volume_fade_out_input_max = 1.600000
        loop_track = "false"
        should_queue_track = "true"
        block_won_lost = "true"
        startpoint_01 = 0.000000
        startpoint_02 = 0.000000
        startpoint_03 = 0.000000
        endpoint_01 = 0.000000
        endpoint_02 = 0.000000
        endpoint_03 = 0.000000
        syncpoints_01 = 
        [
            0.000000,
        ]
        syncpoints_02 = 
        [
            0.000000,
        ]
        syncpoints_03 = 
        [
            0.000000,
        ]
    }

${eventsBlock}
}`;

    downloadFile(config, "soundevents_roundendsound.vsndevts");
}

function downloadFile(content, filename) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
