<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RoundEndSound Config Generator</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    background: #1f2937;
    padding: 20px;
    border-radius: 15px;
    width: 600px;
    height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

/* СКРОЛЛ ОБЛАСТЬ */
.inputs-container {
    flex: 1;
    overflow-y: auto;
    padding-right: 5px;
    margin-bottom: 10px;
}

/* КРАСИВЫЙ СКРОЛЛ */
.inputs-container::-webkit-scrollbar {
    width: 6px;
}
.inputs-container::-webkit-scrollbar-thumb {
    background: #3b82f6;
    border-radius: 10px;
}

.row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}

input {
    flex: 1;
    padding: 7px;
    border-radius: 6px;
    border: none;
    outline: none;
    font-size: 13px;
}

input:focus {
    box-shadow: 0 0 5px #3b82f6;
}

button {
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.controls {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.left-buttons {
    display: flex;
    gap: 10px;
}

.add-btn {
    background: #10b981;
}

.add-btn:hover {
    background: #059669;
}

.add10-btn {
    background: #22c55e;
}

.add10-btn:hover {
    background: #16a34a;
}

.generate-btn {
    background: #3b82f6;
}

.generate-btn:hover {
    background: #2563eb;
}

.remove-btn {
    background: #ef4444;
    padding: 0 8px;
}

.remove-btn:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎵 RoundEndSound Config Generator</h2>

    <div id="inputs" class="inputs-container"></div>

    <div class="controls">
        <div class="left-buttons">
            <button class="add-btn" onclick="addRow()">➕</button>
            <button class="add10-btn" onclick="addMultiple(10)">+10</button>
        </div>

        <button class="generate-btn" onclick="generateConfig()">Создать конфиг</button>
    </div>
</div>

<script>
function createRow() {
    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
        <input type="text" placeholder="Название песни">
        <input type="text" placeholder="SoundEvent Name">
        <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
    `;

    return div;
}

function addRow() {
    document.getElementById("inputs").appendChild(createRow());
}

function addMultiple(count) {
    const container = document.getElementById("inputs");

    for (let i = 0; i < count; i++) {
        container.appendChild(createRow());
    }
}

// стартовые строки
addMultiple(3);

function generateConfig() {
    const rows = document.querySelectorAll(".row");

    let musicBlock = "";

    let index = 1;

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const song = inputs[0].value.trim();
        const sound = inputs[1].value.trim();

        if (song && sound) {
            musicBlock += `        "${index}"\n`;
            musicBlock += `        {\n`;
            musicBlock += `            "Name"        "${song}"\n`;
            musicBlock += `            "Sound"       "${sound}"\n`;
            musicBlock += `        }\n`;
            index++;
        }
    });

    const config = `"RoundEndSound"
{
    "DefaultVolume"                 "5"
    "DisableRandom"                 "0"

    "Music"
    {
${musicBlock}
    }
}`;

    const blob = new Blob([config], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "roundendsound.ini";
    a.click();
}
</script>

</body>
</html>
