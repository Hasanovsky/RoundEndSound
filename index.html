<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RoundEndSound Generator</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    background: #1f2937;
    padding: 20px;
    border-radius: 15px;
    width: 700px;
    height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

.inputs-container {
    flex: 1;
    overflow-y: auto;
    padding-right: 5px;
    margin-bottom: 10px;
}

.inputs-container::-webkit-scrollbar {
    width: 6px;
}
.inputs-container::-webkit-scrollbar-thumb {
    background: #3b82f6;
    border-radius: 10px;
}

.row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
}

input {
    flex: 1;
    padding: 7px;
    border-radius: 6px;
    border: none;
    outline: none;
    font-size: 12px;
}

button {
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.controls {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.left-buttons {
    display: flex;
    gap: 10px;
}

.add-btn { background: #10b981; }
.add10-btn { background: #22c55e; }
.generate-btn { background: #3b82f6; }
.generate2-btn { background: #a855f7; }

.add-btn:hover { background: #059669; }
.add10-btn:hover { background: #16a34a; }
.generate-btn:hover { background: #2563eb; }
.generate2-btn:hover { background: #9333ea; }

.remove-btn {
    background: #ef4444;
    padding: 0 8px;
}
.remove-btn:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎵 RoundEndSound Generator</h2>

    <div id="inputs" class="inputs-container"></div>

    <div class="controls">
        <div class="left-buttons">
            <button class="add-btn" onclick="addRow()">➕</button>
            <button class="add10-btn" onclick="addMultiple(10)">+10</button>
        </div>

        <div class="left-buttons">
            <button class="generate-btn" onclick="generateINI()">Создать ini</button>
            <button class="generate2-btn" onclick="generateVSNDEvents()">Создать vsndevts</button>
        </div>
    </div>
</div>

<script>
function createRow() {
    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
        <input type="text" placeholder="Название песни">
        <input type="text" placeholder="SoundEvent Name">
        <input type="text" placeholder="SoundPath (sounds/... .vsnd)">
        <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
    `;

    return div;
}

function addRow() {
    document.getElementById("inputs").appendChild(createRow());
}

function addMultiple(count) {
    const container = document.getElementById("inputs");
    for (let i = 0; i < count; i++) {
        container.appendChild(createRow());
    }
}

// старт
addMultiple(3);

function generateINI() {
    const rows = document.querySelectorAll(".row");
    let musicBlock = "";
    let index = 1;

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const song = inputs[0].value.trim();
        const sound = inputs[1].value.trim();

        if (song && sound) {
            musicBlock += `        "${index}"\n`;
            musicBlock += `        {\n`;
            musicBlock += `            "Name"        "${song}"\n`;
            musicBlock += `            "Sound"       "${sound}"\n`;
            musicBlock += `        }\n`;
            index++;
        }
    });

    const config = `"RoundEndSound"
{
    "DefaultVolume"                 "5"
    "DisableRandom"                 "0"

    "Music"
    {
${musicBlock}
    }
}`;

    downloadFile(config, "roundendsound.ini");
}

function generateVSNDEvents() {
    const rows = document.querySelectorAll(".row");

    let eventsBlock = "";

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const eventName = inputs[1].value.trim();
        const path = inputs[2].value.trim();

        if (eventName && path) {
            eventsBlock += `    ${eventName} = \n`;
            eventsBlock += `    {\n`;
            eventsBlock += `        base = "roundendsound.base"\n`;
            eventsBlock += `        vsnd_files = "${path}"\n`;
            eventsBlock += `        volume = 1.000000\n`;
            eventsBlock += `    }\n`;
        }
    });

    const config = `<!-- kv3 encoding:text:version{e21c7f3c-8a33-41c5-9977-a76d3a32aa0d} format:generic:version{7412167c-06e9-4698-aff2-e63eb59037e7} -->
{
    Event.CTWin = 
    {
        type = "csgo_mega"
        volume = 0.000000
    }
    Event.TERWin = 
    {
        type = "csgo_mega"
        volume = 0.000000
    }

    roundendsound.base = 
    {
        type = "csgo_music"
        priority = 5.000000
        stop_music = "true"
        volume_fade_out_input_max = 1.600000
        loop_track = "false"
        should_queue_track = "true"
        block_won_lost = "true"
    }

${eventsBlock}
}`;

    downloadFile(config, "soundevents_roundendsound.vsndevts");
}

function downloadFile(content, filename) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
