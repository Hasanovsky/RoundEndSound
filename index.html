<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RoundEndSound Generator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #141e30, #000000);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container-box {
    background: #00000012;
    padding: 20px;
    /*border-radius: 15px;*/
    width: 800px;
    height: 85vh;
    display: flex;
    flex-direction: column;
}

/* scrollbar */

::-webkit-scrollbar-thumb {
  border-width: 1px 1px 1px 2px;
  background-color: #ffffff;
}

::-webkit-scrollbar-thumb:hover {
  border-width: 1px 1px 1px 2px;
  border-color: var(--span);
  background-color: var(--span);
}

::-webkit-scrollbar-track {
  border-width: 0;
}

::-webkit-scrollbar-track:hover {
      background-color: #ffffff;
}

::-webkit-scrollbar {
  background-color: #00000000;
  width: 2px;
  height: 2px;
}

.inputs-container {
    flex: 1;
    overflow-y: auto;
}

.row-item {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
}

input {
    font-size: 13px !important;
}

.invalid {
    border: 2px solid #ef4444 !important;
}
</style>
</head>

<body>

<div class="container-box">
    <h3 class="text-center mb-3">🎵 RoundEndSound Generator</h3>

    <div id="inputs" class="inputs-container mb-3"></div>

    <div class="d-flex justify-content-between">
        <div class="d-flex gap-2">
            <button class="btn btn-success" onclick="addRow()">➕</button>
            <button class="btn btn-success" onclick="addMultiple(10)">+10</button>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="generateINI()">Создать ini</button>
            <button class="btn btn-warning" onclick="generateVSNDEvents()">Создать vsndevts</button>
        </div>
    </div>
</div>

<script>

function isValidEventName(name) {
    return /^[A-Za-z_][A-Za-z0-9_.]*$/.test(name);
}

function createRow() {
    const div = document.createElement("div");
    div.className = "row-item";

    div.innerHTML = `
        <input type="text" class="form-control" placeholder="Название песни">
        <input type="text" class="form-control event-input" placeholder="SoundEvent Name">
        <input type="text" class="form-control" placeholder="SoundPath (sounds/... .vsnd)">
        <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✖</button>
    `;

    // 👉 Валидация при вводе
    const eventInput = div.querySelector(".event-input");

    eventInput.addEventListener("input", () => {
        if (!isValidEventName(eventInput.value)) {
            eventInput.classList.add("invalid");
        } else {
            eventInput.classList.remove("invalid");
        }
    });

    return div;
}

function addRow() {
    document.getElementById("inputs").appendChild(createRow());
}

function addMultiple(count) {
    const container = document.getElementById("inputs");
    for (let i = 0; i < count; i++) {
        container.appendChild(createRow());
    }
}

addMultiple(3);

function validateAll() {
    const inputs = document.querySelectorAll(".event-input");
    for (let input of inputs) {
        if (input.value && !isValidEventName(input.value)) {
            alert("Ошибка: SoundEvent Name содержит недопустимые символы!");
            return false;
        }
    }
    return true;
}

function generateINI() {
    if (!validateAll()) return;

    const rows = document.querySelectorAll(".row-item");
    let musicBlock = "";
    let index = 1;

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const song = inputs[0].value.trim();
        const sound = inputs[1].value.trim();

        if (song && sound) {
            musicBlock += `        "${index}"\n`;
            musicBlock += `        {\n`;
            musicBlock += `            "Name" "${song}"\n`;
            musicBlock += `            "Sound" "${sound}"\n`;
            musicBlock += `        }\n`;
            index++;
        }
    });

    const config = `"RoundEndSound"
{
    "DefaultVolume" "5"
    "DisableRandom" "0"

    "Music"
    {
${musicBlock}
    }
}`;

    downloadFile(config, "roundendsound.ini");
}

function generateVSNDEvents() {
    if (!validateAll()) return;

    const rows = document.querySelectorAll(".row-item");
    let eventsBlock = "";

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const eventName = inputs[1].value.trim();
        const path = inputs[2].value.trim();

        if (eventName && path) {
            eventsBlock += `    ${eventName} =\n`;
            eventsBlock += `    {\n`;
            eventsBlock += `        base = "roundendsound.base"\n`;
            eventsBlock += `        vsnd_files = "${path}"\n`;
            eventsBlock += `        volume = 1.0\n`;
            eventsBlock += `    }\n`;
        }
    });

    const config = `{
${eventsBlock}
}`;

    downloadFile(config, "soundevents_roundendsound.vsndevts");
}

function downloadFile(content, filename) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
